<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>

  <title>My blog</title>

<body>
  <h1>My blog</h1>
  <p id="message"></p>
  <div id="login-register" style="display:none;">
    <button type="button" id="login">Log in</button>
    <button type="button" id="register">Register</button>
  </div>

  <div id="login-div" style="display:none;">
    <h2>Log in</h2>
    <form>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email"/>
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password"/>
      </div>
      <button type="button" id="login-button">Log in</button>
      <button type="button" id="cancel-login">Cancel</button>
    </form>
  </div>

  <div id="register-div" style="display:none;">
    <h2>Register</h2>
    <form>
      <div>
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Username"/>
      </div>
      <div>
        <label for="email1">Email</label>
        <input type="email" id="email1" placeholder="Email"/>
      </div>
      <div>
        <label for="password1">Password</label>
        <input type="password" id="password1" placeholder="Password"/>
      </div>
      <div>
        <label for="password2">Password</label>
        <input type="password" id="password2" placeholder="Password"/>
      </div>
      <button type="button" id="register-button">Register</button>
      <button type="button" id="register-cancel">Cancel</button>
    </form>
  </div>

  <div id="posts-container" style="display:none;">
    <button type="button" id="new-post">New post</button>

    <div id="posts-list" style="display:none;"></div>

    <div id="delete-post" style="display:none;">
      <p>Are you sure you want to delete this post?</p>
      <button type="button" id="delete-post-yes">Yes</button>
      <button type="button" id="delete-post-no">No</button>
    </div>

    <div id="edit-post-div" style="display:none;">
      <form>
        <div>
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="Title"/>
        </div>
        <div>
          <label for="content">Content</label>
          <textarea id="content" placeholder="Content"></textarea>
        </div>
        <button type="button" id="save-post">Save post</button>
